<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 2: Галерея</title>
    <style>
        .gallery-container {
            width: 400px;
            margin: 50px auto;
            text-align: center;
        }
        .image-wrapper {
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="image-wrapper">
            <img id="gallery-img" src="" alt="Gallery Image">
        </div>
        <button id="btn-prev">Назад</button>
        <button id="btn-next">Вперед</button>
    </div>

    <script src="pickme.js"></script>
</body>
</html>
